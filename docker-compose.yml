services:
  # MySQL for the Core Service (Laravel)
  mysql:
    image: mysql:8.0
    container_name: pet_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pet_core
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: pet_user
      MYSQL_PASSWORD: secret123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pet_network

  # MongoDB for the Tracking Service (Hyperf)
  mongodb:
    image: mongo:latest
    container_name: pet_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pet_network

  # RabbitMQ for messaging between microservices
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pet_rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP protocol port (for the code to connect)
      - "15672:15672" # Web administration panel port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pet_network

  # High-Performance Engine (Hyperf) for GPS Ingestion
  tracker-api:
    build:
      context: ./tracker-api
    container_name: pet_hyperf
    restart: unless-stopped
    volumes:
      - ./tracker-api:/opt/www
      - /opt/www/vendor
    ports:
      - "9501:9501"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - pet_network

  # Core API (Laravel REST API)
  core-api:
    build:
      context: ./core-api
    container_name: pet_core_api
    restart: unless-stopped
    environment:
      - RUN_MIGRATIONS=true
    ports:
      - "8000:8000"
    volumes:
      - ./core-api:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - pet_network

  # VueJS for the Front-End
  pet-web:
    build:
      context: ./pet-tracker-web
      dockerfile: Dockerfile
    container_name: pet_web
    ports:
      - "5173:5173"
    volumes:
      - ./pet-tracker-web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - pet_network

  # ---------------------------------------------------------
  # 1. WEBSOCKET SERVER (Laravel Reverb)
  # ---------------------------------------------------------
  reverb-server:
    build:
      context: ./core-api
    container_name: pet_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./core-api:/var/www/html
    depends_on:
      - mysql
    networks:
      - pet_network

  # ---------------------------------------------------------
  # 2. QUEUE CONSUMER (Worker RabbitMQ)
  # ---------------------------------------------------------
  queue-worker:
    build:
      context: ./core-api
    container_name: pet_worker
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=pet_core
      - DB_USERNAME=pet_user
      - DB_PASSWORD=secret123
      - REVERB_HOST=reverb-server
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    command: ["php", "artisan", "rabbitmq:consume-locations"]
    volumes:
      - ./core-api:/var/www/html
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - pet_network

  # ---------------------------------------------------------
  # 3. HARDWARE SIMULATOR
  # ---------------------------------------------------------
  hardware-simulator:
    build:
      context: ./core-api
    container_name: pet_simulator
    # Aguarda 20 segundos para o core-api criar o Pet Rex no Seeder!
    command: sh -c "sleep 20 && php artisan pet:simulate-hardware"
    volumes:
      - ./core-api:/var/www/html
    depends_on:
      - tracker-api
    networks:
      - pet_network

# Defining named volumes for data persistence
volumes:
  mysql_data:
  mongo_data:
  rabbitmq_data:

# Creating an isolated network for services to communicate with each other
networks:
  pet_network:
    driver: bridge